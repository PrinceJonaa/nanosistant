<svg xmlns="http://www.w3.org/2000/svg" width="800" height="828" viewBox="0 0 800 828">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Cascadia Code', 'SF Mono', monospace; font-size: 13px; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="828" fill="#0a0e17" rx="8"/>
  
  <!-- Window chrome -->
  <rect width="800" height="32" fill="#111827" rx="8"/>
  <rect y="24" width="800" height="8" fill="#111827"/>
  <circle cx="16" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="16" r="5" fill="#febc2e"/>
  <circle cx="48" cy="16" r="5" fill="#28c840"/>
  <text x="400" y="20" fill="#6b7894" text-anchor="middle" font-size="11">nanosistant</text>
  
  <text x="20" y="40" fill="#e0e6f0" opacity="0" id="l0">
    
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.00s" fill="freeze"/>
  </text>
    
