version: "3.9"

services:
  nanosistant:
    build: .
    ports:
      - "3000:3000"
      - "50051:50051"
    volumes:
      - nstn-data:/var/lib/nanosistant
      - ./config:/etc/nanosistant/config:ro
    environment:
      - RUST_LOG=info
      - NSTN_CONFIG_DIR=/etc/nanosistant/config
      - NSTN_DATA_DIR=/var/lib/nanosistant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  nstn-data:
  qdrant-data:
