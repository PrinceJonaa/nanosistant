name: "✨ Feature Request"
description: Suggest a new feature or enhancement
title: "[FEAT] "
labels: ["enhancement"]
assignees: ["PrinceJonaa"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please help us understand your use case.
        
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have searched [existing requests](https://github.com/PrinceJonaa/nanosistant/issues?q=is%3Aissue+label%3Aenhancement) and this hasn't been requested
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? Why do you need this?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: Which tier does this affect?
      options:
        - NanoClaw (Edge)
        - RuFlo (Brain / Orchestrator)
        - RuVector (Knowledge)
        - Pack System
        - CLI / REPL
        - Cross-tier
        - New component
    validations:
      required: true

  - type: dropdown
    id: is_deterministic
    attributes:
      label: Can this be a deterministic function?
      description: Could this feature be implemented as a pure function (no LLM needed)?
      options:
        - "Yes — new deterministic function"
        - "Yes — new pack / TOML rules"
        - "No — requires LLM judgment"
        - "Not sure"
    validations:
      required: true

  - type: input
    id: module
    attributes:
      label: Target module (if deterministic)
      description: Which det/ module? e.g. det/domain/music.rs
      placeholder: "det/domain/..."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
