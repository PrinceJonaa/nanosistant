name: "🐛 Bug Report"
description: Report a bug or unexpected behavior in Nanosistant
title: "[BUG] "
labels: ["bug"]
assignees: ["PrinceJonaa"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this bug! Please fill out the sections below.
        
        Before submitting, please check:
        - You're using the latest version (`nanosistant --version`)
        - This issue hasn't already been reported
        
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have searched [existing issues](https://github.com/PrinceJonaa/nanosistant/issues?q=is%3Aissue+label%3Abug) and this hasn't been reported
          required: true
        - label: I am using the latest version of Nanosistant
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Nanosistant is affected?
      options:
        - CLI / REPL
        - Orchestrator / Routing
        - Deterministic Functions
        - Pack System
        - Memory System (L0-L3)
        - Dreamer / Consolidation
        - API Client (Anthropic / Azure / OpenAI)
        - NanoClaw (Edge)
        - RuVector (Knowledge)
        - ruflo Integration
        - MCP Client
        - iOS Client (NanoClawKit)
        - Other
    validations:
      required: true

  - type: dropdown
    id: routing_tier
    attributes:
      label: Which routing tier failed?
      description: If this is a routing issue, which tier was involved?
      options:
        - "N/A"
        - "Tier 0: Deterministic interception"
        - "Tier 1: Aho-Corasick"
        - "Tier 2: Regex"
        - "Tier 3: Weighted keywords"
        - "Tier 4: Fuzzy / Levenshtein"
        - "Tier 6: ruflo MCP"
        - "Tier 7: LLM classifier"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: "Paste any error output. Run with `RUST_LOG=debug` for verbose output."
      render: shell

  - type: input
    id: version
    attributes:
      label: Nanosistant Version
      description: Output of `nanosistant --version`
      placeholder: "0.7.0"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.2 / Ubuntu 24.04 / Windows 11"

  - type: dropdown
    id: model_provider
    attributes:
      label: Model Provider
      options:
        - "N/A"
        - Anthropic (Claude)
        - Azure OpenAI
        - OpenAI
        - xAI (Grok)
        - Local (Ollama/vLLM)
