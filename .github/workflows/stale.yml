name: Stale Issues

on:
  schedule:
    - cron: '0 1 * * *'  # daily 1am

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: 'This issue has been inactive for 60 days. It will be closed in 14 days if no activity occurs.'
          stale-pr-message: 'This PR has been inactive for 30 days. Please update or it will be closed in 7 days.'
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 7
          exempt-issue-labels: 'pinned,roadmap,help wanted'
